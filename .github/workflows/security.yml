name: security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Create ui/dist placeholder for embed directive
        run: mkdir -p ui/dist && touch ui/dist/embed_placeholder

      - name: Run govulncheck (skipping pkg/tray to avoid GTK install)
        run: |
          go run golang.org/x/vuln/cmd/govulncheck@latest \
            $(go list -e ./... | grep -v '/pkg/tray$')

  bun-audit:
    runs-on: ubuntu-latest
    container: oven/bun:latest
    steps:
      - uses: actions/checkout@v4
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun audit
