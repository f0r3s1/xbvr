name: lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install systray C deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libayatana-appindicator3-dev libgtk-3-dev pkg-config

      - name: Create ui/dist placeholder for embed directive
        run: mkdir -p ui/dist && touch ui/dist/embed_placeholder

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
