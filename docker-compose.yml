services:
  xbvr:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9999:9999"
      - "9998:9998"
    volumes:
      - xbvr-config:/root/.config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9999/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  xbvr-config:
