root = '.'
tmp_dir = 'dist'

[env]
DEBUG = "1"
CGO_ENABLED = "1"

[build]
cmd = 'go build -o dist/xbvr -tags="json1" main.go'
full_bin = 'dist/xbvr'
include_ext = ['go']
exclude_dir = ['node_modules', 'cache', 'dist', 'ui', 'tmp']
# Use polling for Docker volume mounts (inotify unreliable on macOS bind mounts)
poll = true
poll_interval = 1000
