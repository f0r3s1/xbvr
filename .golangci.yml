version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - unused
  exclusions:
    rules:
      # Legacy scrape helpers / experimental code — dead funcs tolerated.
      - path: ^pkg/scrape/
        linters:
          - unused
      - path: ^pkg/api/stashdb\.go$
        linters:
          - unused
    paths:
      - pkg/dms
      - pkg/tray

formatters:
  enable:
    - gofmt

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
