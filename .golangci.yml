version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
  settings:
    gosec:
      excludes:
        - G104
        - G304
        - G404
        - G501
        - G505
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
    paths:
      - pkg/dms
      - pkg/tray

formatters:
  enable:
    - gofmt

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
